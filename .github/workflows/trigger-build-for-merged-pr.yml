name: Run Go Workflow for Specific Commit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to run workflow on'
        required: true
        default: ''

jobs:
  run-go-for-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout specific commit
        run: |
          COMMIT=${{ github.event.inputs.commit_sha }}
          echo "Checking out commit $COMMIT..."
          git fetch origin $COMMIT
          git checkout $COMMIT

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'

      - name: Remove vendor directory
        run: rm -rf vendor

      - name: Update dependencies
        run: go mod tidy

      - name: Build
        run: go build -mod=readonly -v ./...

      - name: Test
        run: go test -mod=readonly -v ./...

      - name: Show current commit
        run: |
          echo "Workflow ran on commit: $(git rev-parse HEAD)"
